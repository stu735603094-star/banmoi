<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản Đồ Ngập Lụt Phú Hòa - THPT Trần Suyền</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f0f4f8; display: flex; flex-direction: column; align-items: center; }
        .header { background: #004a8c; color: white; width: 100%; text-align: center; padding: 20px 0; border-bottom: 4px solid #ff9800; }
        
        .container { max-width: 1000px; width: 95%; margin: 20px auto; }
        
        /* Khung chứa các lớp bản đồ chồng lên nhau */
        .map-box { 
            position: relative; 
            background: #fff; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            line-height: 0; /* Khử khoảng cách thừa chân ảnh */
        }

        .map-box img { 
            width: 100%; 
            height: auto; 
        }

        /* Lớp ảnh ngập lụt nằm đè lên lớp nền */
        .flood-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            opacity: 0;
            transition: opacity 1.2s ease-in-out; /* Hiệu ứng nước dâng mượt */
        }

        .flood-layer.active {
            opacity: 1;
            position: relative; /* Lớp active sẽ định hình độ cao cho khung */
        }

        .controls { margin-top: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        button { padding: 12px 20px; border-radius: 30px; border: 1px solid #004a8c; background: white; cursor: pointer; font-weight: bold; color: #004a8c; transition: 0.3s; }
        button.active { background: #004a8c; color: white; }
        button.play-btn { background: #ff9800; color: white; border: none; }

        .mission { margin-top: 20px; background: #fff; padding: 20px; border-left: 6px solid #e91e63; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="header">
    <h2>HỆ THỐNG MÔ PHỎNG NGẬP LỤT TƯƠNG TÁC</h2>
    <p>Trường THPT Trần Suyền - Huyện Phú Hòa</p>
</div>

<div class="container">
    <div class="map-box">
        <img src="GTHONG.png" id="img-gt" class="flood-layer active">
        <img src="DEM2.png" id="img-dh" class="flood-layer">
        <img src="BDC1.png" id="img-c1" class="flood-layer">
        <img src="BDC2.png" id="img-c2" class="flood-layer">
        <img src="BDC3.png" id="img-c3" class="flood-layer">
    </div>

    <div class="controls">
        <button onclick="update('gt', this)" class="active">Giao thông</button>
        <button onclick="update('dh', this)">Địa hình</button>
        <button onclick="update('c1', this)" id="btn-c1">BĐ 1</button>
        <button onclick="update('c2', this)" id="btn-c2">BĐ 2</button>
        <button onclick="update('c3', this)" id="btn-c3">BĐ 3</button>
        <button class="play-btn" onclick="playAuto()">▶ Chạy mô phỏng</button>
    </div>

    <div class="mission" id="mission-text">
        <b>Nhiệm vụ:</b> Quan sát mạng lưới giao thông quanh trường THPT Trần Suyền.
    </div>
</div>

<script>
    const data = {
        'gt': '<b>Giao thông:</b> Quan sát các tuyến đường QL25 và cao tốc.',
        'dh': '<b>Địa hình:</b> Xác định các vùng cao (màu nhạt) để sơ tán.',
        'c1': '<b>Báo động 1:</b> Nước bắt đầu dâng ở vùng ven sông.',
        'c2': '<b>Báo động 2:</b> Ngập lụt diện rộng, nhiều đường bị cắt đứt.',
        'c3': '<b>Báo động 3:</b> Tình trạng khẩn cấp! Toàn vùng bị chia cắt.'
    };

    let playInterval;

    function update(id, btn) {
        // Tắt tự động nếu người dùng nhấn nút thủ công
        if (!btn.id.startsWith('btn-auto')) clearInterval(playInterval);

        // Chuyển ảnh bằng hiệu ứng mờ dần
        document.querySelectorAll('.flood-layer').forEach(img => img.classList.remove('active'));
        document.getElementById('img-' + id).classList.add('active');

        // Cập nhật text
        document.getElementById('mission-text').innerHTML = data[id];

        // Đổi màu nút
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function playAuto() {
        clearInterval(playInterval);
        let steps = ['c1', 'c2', 'c3'];
        let i = 0;
        playInterval = setInterval(() => {
            const id = steps[i];
            update(id, document.getElementById('btn-' + id));
            i++;
            if (i >= steps.length) i = 0;
        }, 2000);
    }
</script>

</body>
</html>
