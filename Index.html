<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mo phong Ngap Lut - THPT Tran Suyen</title>
    <style>
        body { margin:0; font-family: 'Segoe UI', Arial, sans-serif; background:#f4f7f9; display: flex; flex-direction: column; align-items: center; }
        .header { background:#003366; color:#fff; padding:20px; text-align:center; width: 100%; border-bottom: 5px solid #ff9800; }
        .container { max-width:1000px; width: 95%; margin: 20px auto; }

        /* Khung chứa bản đồ */
        .map-box { 
            position:relative; 
            background:#fff; 
            border-radius:15px; 
            overflow:hidden; 
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            min-height: 400px;
        }

        /* Các lớp bản đồ chồng lên nhau */
        .map-layer {
            width:100%;
            height: auto;
            display: none;
            border-radius: 10px;
        }

        .map-layer.active {
            display: block;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Điều khiển */
        .controls { margin-top:20px; display:flex; gap:10px; justify-content:center; flex-wrap: wrap; }
        button { padding:12px 20px; border-radius:25px; border:1px solid #003366; background:#fff; color:#003366; cursor:pointer; font-weight:bold; transition: 0.3s; }
        button.active { background:#003366; color:#fff; }
        button.play-btn { background:#ff9800; color:#fff; border:none; }

        /* Nhiệm vụ */
        .mission { margin-top:20px; background:#fff; padding:20px; border-left:6px solid #e91e63; border-radius:10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="header">
    <h2>HE THONG MO PHONG NGAP LUT DONG</h2>
    <p>Truong THPT Tran Suyen - Phu Hoa</p>
</div>

<div class="container">
    <div class="map-box">
        <img src="GTHONG.png" id="img-gt" class="map-layer active">
        <img src="DEM2.png" id="img-dh" class="map-layer">
        <img src="BDC1.png" id="img-c1" class="map-layer">
        <img src="BDC2.png" id="img-c2" class="map-layer">
        <img src="BDC3.png" id="img-c3" class="map-layer">
    </div>

    <div class="controls">
        <button onclick="update('gt', this)" class="active">Giao thong</button>
        <button onclick="update('dh', this)">Dia hinh</button>
        <button onclick="update('c1', this)" id="btn-c1">BD 1</button>
        <button onclick="update('c2', this)" id="btn-c2">BD 2</button>
        <button onclick="update('c3', this)" id="btn-c3">BD 3</button>
        <button class="play-btn" onclick="playAuto()">▶ Chay tu dong</button>
    </div>

    <div class="mission" id="mission-text">
        <b>Nhiem vu:</b> Quan sat mang luoi giao thong quanh truong THPT Tran Suyen.
    </div>
</div>

<script>
    const content = {
        'gt': '<b>Giao thong:</b> Quan sat cac truc duong QL25 va cao toc.',
        'dh': '<b>Dia hinh:</b> Tim cac vung cao de so tan (DEM2).',
        'c1': '<b>Bao dong 1:</b> Nuoc bat dau dang o vung ven song.',
        'c2': '<b>Bao dong 2:</b> Ngap lut dien rong, nhieu duong bi cat dut.',
        'c3': '<b>Bao dong 3:</b> Tinh trang khan cap! Toan vung bi chia cat.'
    };

    let interval;

    function update(id, btn) {
        // Xoa class active o tat ca anh va nut
        document.querySelectorAll('.map-layer').forEach(img => img.classList.remove('active'));
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));

        // Hien anh duoc chon
        const targetImg = document.getElementById('img-' + id);
        if(targetImg) targetImg.classList.add('active');

        // Bat nut duoc chon
        if(btn) btn.classList.add('active');

        // Cap nhat chu
        document.getElementById('mission-text').innerHTML = content[id];
    }

    function playAuto() {
        clearInterval(interval);
        let steps = ['c1', 'c2', 'c3'];
        let i = 0;
        interval = setInterval(() => {
            const id = steps[i];
            update(id, document.getElementById('btn-' + id));
            i++;
            if (i >= steps.length) i = 0;
        }, 2000);
    }
</script>

</body>
</html>
